name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-license: true

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "build-tools;35.0.0" "platforms;android-35"
        shell: bash

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Verify gradle-wrapper.jar is present and valid
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ "$(wc -c < gradle/wrapper/gradle-wrapper.jar)" -lt 1000 ]; then
            echo "gradle-wrapper.jar missing or too small — downloading fresh copy"
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
              "https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar"
          fi
          file gradle/wrapper/gradle-wrapper.jar
        shell: bash

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        shell: bash

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --console=plain --stacktrace
        shell: bash

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --console=plain
        shell: bash

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: INTERNDRA-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/test-results/
            app/build/reports/
          if-no-files-found: ignore
          retention-days: 7
